spring:
  application:
    name: dgehrm
  #  datasource:
  #    url: jdbc:h2:mem:dgehrm-final
  #    driver-class-name: org.h2.Driver
  #    username: sa
  #    password:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:${MARIADB_PORT:3306}/${MARIADB_DATABASE:dbname}?maxPoolSize=20&characterEncoding=UTF-8
    username: ${MARIADB_USER:dbuser}
    password: ${MARIADB_PASSWORD:1234}
    hikari:
      maximum-pool-size: 10 # TPS 및 서버 스펙에 따라 조정 (기본 10)
      minimum-idle: 10
      idle-timeout: 300000 # 5분
      max-lifetime: 1800000 # 30분 (MariaDB wait_timeout보다 무조건 짧아야 함!)
      connection-timeout: 3000 # 3초
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  #h2:
  #  console:
  #    enabled: true
  #    path: /h2-console
  #    settings:
  #      web-allow-others: true
  flyway:
    enabled: true
    clean-disabled: false    # clean 기능 활성화
    locations: classpath:db/migration
    baseline-on-migrate: true
app:
  api:
    base-path: /api/v1
  jwt:
    issuer: springboot-backend
    secret: ${JWT_SECRET:c3ByaW5nLWJvb3Qtand0LXNlY3JldC1rZXktbXVzdC1iZS1hdC1sZWFzdC0zMi1ieXRlcw==}
    access-token-expiration-seconds: 1800
    refresh-token-expiration-seconds: 1209600
  cors:
    allowed-origin-patterns:
      - ${CORS_ALLOWED_ORIGIN_PATTERN:http://localhost:*}
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
