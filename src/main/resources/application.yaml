spring:
  application:
    name: dgehrm
  datasource:
    url: jdbc:h2:mem:dgehrm-final
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
app:
  api:
    base-path: /api/v1
  jwt:
    issuer: springboot-backend
    secret: ${JWT_SECRET:c3ByaW5nLWJvb3Qtand0LXNlY3JldC1rZXktbXVzdC1iZS1hdC1sZWFzdC0zMi1ieXRlcw==}
    access-token-expiration-seconds: 1800
    refresh-token-expiration-seconds: 1209600
  cors:
    allowed-origin-patterns:
      - ${CORS_ALLOWED_ORIGIN_PATTERN:http://localhost:*}
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
